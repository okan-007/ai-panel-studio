name: CI — lint → unit-test → e2e-test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from Actions tab

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # =========================================================================
  # Job 1 — Lint (server + client)
  # =========================================================================
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Install root + server + client deps via workspaces
      - name: Install dependencies
        run: |
          cd server && npm install
          cd ../client && npm install

      - name: Lint server
        run: cd server && npm run lint
        continue-on-error: false

      - name: Lint client
        run: cd client && npm run lint
        continue-on-error: false

  # =========================================================================
  # Job 2 — Unit tests (server via vitest)
  # =========================================================================
  unit-test:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: []  # can run in parallel with lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: cd server && npm install

      - name: Run unit tests
        run: cd server && npm run test:coverage

      - name: Upload coverage to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 7

      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds are enforced in vitest.config.ts"
          echo "Lines: 80% | Branches: 75% | Functions: 80% | Statements: 80%"

  # =========================================================================
  # Job 3 — E2E tests (Playwright)
  # =========================================================================
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-test]  # wait for unit tests to pass first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: cd client && npm install

      - name: Install Playwright browsers
        run: cd client && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd client && npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/e2e-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: client/test-results/
          retention-days: 7

  # =========================================================================
  # Job 4 — Combined status check (for branch-protection rules)
  # =========================================================================
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, unit-test, e2e-test]
    if: always()
    timeout-minutes: 1

    steps:
      - name: Verify all jobs passed
        run: |
          echo "lint       → ${{ needs.lint.result }}"
          echo "unit-test  → ${{ needs.unit-test.result }}"
          echo "e2e-test   → ${{ needs.e2e-test.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint failed"
            exit 1
          fi
          if [[ "${{ needs.unit-test.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-test.result }}" != "success" ]]; then
            echo "❌ E2E tests failed"
            exit 1
          fi
          echo "✅ All checks passed"
